<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guestbook</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Guestbook</h1>
        <p class="subtitle">Leave a message for everyone to see</p>
      </header>

      <section class="form-section">
        <form id="guestbook-form">
          <label for="name">Your name</label>
          <input type="text" id="name" name="name" placeholder="Anna" required />

          <label for="message">Your message</label>
          <textarea id="message" name="message" rows="3" placeholder="Hello world!" required></textarea>

          <button type="submit">Sign Guestbook</button>
        </form>
      </section>

      <section class="messages-section">
        <h2>Messages</h2>
        <ul id="messages-list">
          <li class="empty-state">No messages yet. Be the first to sign!</li>
        </ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
